<text class="action-label" x="61.75" y="13.68"><tspan x="61.75" dy="0">WS streaming; A2 receives codex frames, A3 emits</tspan><tspan x="61.75" dy="0.82">text-delta and tool-call parts as deltas arrive; counters</tspan><tspan x="61.75" dy="0.82">emittedTextDeltas and emittedToolCalls accumulate</tspan></text>
