<text class="action-label" x="37.05" y="23.09"><tspan x="37.05" dy="0">Run classifier on streamStateSnapshot + requestOptionsShape;</tspan><tspan x="37.05" dy="0.82">derive {causeFamily, recoveryAction, suspectParams, logSequence}</tspan></text>
