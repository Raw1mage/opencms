<rect class="action" x="27.70" y="29.07" width="18.70" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="37.05" y="29.68"><tspan x="37.05" dy="0">Persist log entry: append JSONL line to &lt;state&gt;/codex/</tspan><tspan x="37.05" dy="0.82">empty-turns.jsonl AND publish bus event on codex.emptyTurn;</tspan><tspan x="37.05" dy="0.82">on write failure swallow and emit console.error breadcrumb</tspan></text>
<line class="assoc" x1="26.70" y1="37.50" x2="27.70" y2="37.50"/>
<rect class="action" x="27.70" y="36.07" width="18.70" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="37.05" y="37.50"><tspan x="37.05" dy="0">Apply recovery action selected by classifier</tspan></text>
