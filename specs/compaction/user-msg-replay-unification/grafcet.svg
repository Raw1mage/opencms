<text class="action-label" x="53.94" y="46.09"><tspan x="53.94" dy="0">Skip replay: snapshot already after anchor (race); record o</tspan><tspan x="53.94" dy="0.82">utcome=skipped:already-after-anchor in telemetry payload</tspan></text>
<line class="assoc" x1="70.58" y1="46.50" x2="71.58" y2="46.50"/>
