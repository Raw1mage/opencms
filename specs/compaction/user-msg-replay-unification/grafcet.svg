<text class="action-label" x="24.64" y="20.68"><tspan x="24.64" dy="0">Inside SessionCompaction.run: snapshotUnansweredUserMessage walks stre</tspan><tspan x="24.64" dy="0.82">am backward; identifies most-recent user msg with no completed-finish as</tspan><tspan x="24.64" dy="0.82">sistant child; copies info+parts; captures emptyAssistantID? when present</tspan></text>
<line class="assoc" x1="41.29" y1="21.50" x2="42.29" y2="21.50"/>
<rect class="action" x="42.29" y="20.07" width="23.29" height="2.86"/>
<text class="action-label" x="53.94" y="20.68"><tspan x="53.94" dy="0">provider-switch pre-loop path (prompt.ts:1099-1146): bypasses S</tspan><tspan x="53.94" dy="0.82">essionCompaction.run; calls compactWithSharedContext directly; s</tspan><tspan x="53.94" dy="0.82">ame snapshot helper invoked here BEFORE the legacy anchor write</tspan></text>
<line class="assoc" x1="41.29" y1="30.50" x2="42.29" y2="30.50"/>
<rect class="action" x="42.29" y="29.07" width="23.29" height="2.86"/>
<text class="action-label" x="53.94" y="29.68"><tspan x="53.94" dy="0">Anchor write: kind chain executes (low-cost-server first for codex, falls through to narrative</tspan><tspan x="53.94" dy="0.82">/ replay-tail / llm-agent); winning kind writes summary-true assistant message via compactWi</tspan><tspan x="53.94" dy="0.82">thSharedContext or tryLlmAgent inline; codex chain reset via publishCompactedAndResetChain</tspan></text>
