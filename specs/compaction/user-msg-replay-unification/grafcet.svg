<text class="action-label" x="83.22" y="46.09"><tspan x="83.22" dy="0">Skip replay: no unanswered user msg OR feature flag disabled</tspan><tspan x="83.22" dy="0.82">; record outcome=skipped:no-unanswered in telemetry payload</tspan></text>
<line class="assoc" x1="41.29" y1="55.50" x2="42.29" y2="55.50"/>
<rect class="action" x="42.29" y="54.07" width="23.29" height="2.86"/>
<text class="action-label" x="53.94" y="54.68"><tspan x="53.94" dy="0">Emit replay telemetry: bus event compaction.user_msg_replay; appendRecentEvent on sessi</tspan><tspan x="53.94" dy="0.82">on execution; debug.log line per AGENTS.md rule 1; thread {observed, kind} through publishC</tspan><tspan x="53.94" dy="0.82">ompactedAndResetChain so recentEvents records the correct observed value (not unknown)</tspan></text>
<line class="assoc" x1="41.29" y1="62.50" x2="42.29" y2="62.50"/>
<rect class="action" x="42.29" y="61.07" width="23.29" height="2.86"/>
<text class="action-label" x="53.94" y="61.68"><tspan x="53.94" dy="0">decideContinueInjection (replaces INJECT_CONTINUE table): inspect post-anchor stream; if</tspan><tspan x="53.94" dy="0.82">replayed=true OR any user msg already exists post-anchor → skip Continue; if no user msg</tspan><tspan x="53.94" dy="0.82">post-anchor AND observed permits ambient continuation → call injectContinueAfterAnchor</tspan></text>
<line class="assoc" x1="41.29" y1="71.50" x2="42.29" y2="71.50"/>
<rect class="action" x="42.29" y="70.07" width="23.29" height="2.86"/>
<text class="action-label" x="53.94" y="70.68"><tspan x="53.94" dy="0">Runloop continues: filterCompacted re-scans stream; lastUser is guaranteed non-</tspan><tspan x="53.94" dy="0.82">undefined when pre-condition was met (replayed user msg has id &gt; anchor.id); nex</tspan><tspan x="53.94" dy="0.82">t LLM call has the user&#x27;s actual question instead of synthetic Continue substitute</tspan></text>
