<line class="assoc" x1="12.00" y1="46.50" x2="13.00" y2="46.50"/>
<rect class="action" x="13.00" y="45.07" width="23.29" height="2.86"/>
<text class="action-label" x="24.64" y="45.68"><tspan x="24.64" dy="0">Replay: generate newUserID via Identifier.ascending; Session.updateMessage wit</tspan><tspan x="24.64" dy="0.82">h snapshot.info shape and new id; copy parts with fresh part ids targeting new</tspan><tspan x="24.64" dy="0.82">message; Session.removeMessage on emptyAssistantID? then on snapshot.info.id</tspan></text>
<line class="assoc" x1="41.29" y1="46.50" x2="42.29" y2="46.50"/>
