<text class="action-label" x="71.25" y="5.09"><tspan x="71.25" dy="0">Idle: runloop iteration entry; observed conditio</tspan><tspan x="71.25" dy="0.82">n derived; compaction commit decision pending</tspan></text>
<line class="assoc" x1="59.00" y1="12.50" x2="60.00" y2="12.50"/>
<rect class="action" x="60.00" y="11.07" width="22.50" height="2.86"/>
<text class="action-label" x="71.25" y="12.09"><tspan x="71.25" dy="0">tryNarrative loads previous anchor message; computes prevBody = textPartsJoin</tspan><tspan x="71.25" dy="0.82">ed(anchor.parts); parses prevLastRound from `## Round N` markers in prevBody</tspan></text>
<line class="assoc" x1="59.00" y1="19.50" x2="60.00" y2="19.50"/>
<rect class="action" x="60.00" y="18.07" width="22.50" height="2.86"/>
<text class="action-label" x="71.25" y="19.09"><tspan x="71.25" dy="0">Identify unanswered user msg id (Spec 1 synergy): walk tail backward, find most-re</tspan><tspan x="71.25" dy="0.82">cent user msg whose nearest assistant child has finish ∉ {stop, tool-calls, length}</tspan></text>
<line class="assoc" x1="59.00" y1="26.50" x2="60.00" y2="26.50"/>
<rect class="action" x="60.00" y="25.07" width="22.50" height="2.86"/>
<text class="action-label" x="71.25" y="25.68"><tspan x="71.25" dy="0">serializeRedactedDialog walks tail messages (excluding unanswered user msg); per</tspan><tspan x="71.25" dy="0.82">round emits ## Round N header; per role emits **User**/**Reasoning**/**Assis</tspan><tspan x="71.25" dy="0.82">tant**/**Tool** markers; tool outputs replaced with recall_id: part.id references</tspan></text>
<line class="assoc" x1="59.00" y1="33.50" x2="60.00" y2="33.50"/>
<rect class="action" x="60.00" y="32.07" width="22.50" height="2.86"/>
<text class="action-label" x="71.25" y="32.68"><tspan x="71.25" dy="0">Build anchor[n+1].body = prevBody + &#x27;\n\n&#x27; + tailText; compactWith</tspan><tspan x="71.25" dy="0.82">SharedContext writes anchor message with this body as text part;</tspan><tspan x="71.25" dy="0.82">publishCompactedAndResetChain with {observed, kind: &#x27;narrative&#x27;}</tspan></text>
<line class="assoc" x1="59.00" y1="40.50" x2="60.00" y2="40.50"/>
<rect class="action" x="60.00" y="39.07" width="22.50" height="2.86"/>
<text class="action-label" x="71.25" y="40.09"><tspan x="71.25" dy="0">scheduleHybridEnrichment estimates anchor body tokens</tspan><tspan x="71.25" dy="0.82">(chars/4); compares against floor (5K) and ceiling (50K)</tspan></text>
<line class="assoc" x1="59.00" y1="49.50" x2="60.00" y2="49.50"/>
<rect class="action" x="60.00" y="48.07" width="22.50" height="2.86"/>
<text class="action-label" x="71.25" y="49.09"><tspan x="71.25" dy="0">Skip recompress: anchor too small to warrant LL</tspan><tspan x="71.25" dy="0.82">M cost. Telemetry: recompress.skip = below-floor</tspan></text>
<line class="assoc" x1="87.50" y1="49.50" x2="88.50" y2="49.50"/>
<rect class="action" x="88.50" y="48.07" width="22.50" height="2.86"/>
<text class="action-label" x="99.75" y="49.09"><tspan x="99.75" dy="0">Defer recompress: anchor in steady-state band; will fire</tspan><tspan x="99.75" dy="0.82">on next extend if it grows past ceiling. No-op this cycle</tspan></text>
<line class="assoc" x1="30.50" y1="49.50" x2="31.50" y2="49.50"/>
<rect class="action" x="31.50" y="48.07" width="22.50" height="2.86"/>
<text class="action-label" x="42.75" y="49.09"><tspan x="42.75" dy="0">Recompress required: dispatch by provider. Acquire hybridEnrichInFlight lock</tspan><tspan x="42.75" dy="0.82">(per-session). Stale-anchor check: confirm anchor still latest (no interloper)</tspan></text>
<line class="assoc" x1="2.00" y1="58.50" x2="3.00" y2="58.50"/>
<rect class="action" x="3.00" y="57.07" width="22.50" height="2.86"/>
<text class="action-label" x="14.25" y="57.68"><tspan x="14.25" dy="0">Codex path: invoke /responses/compact via tryLowCostServer-style call with</tspan><tspan x="14.25" dy="0.82">anchor body as conversationItem. On success, in-place update anchor&#x27;s text p</tspan><tspan x="14.25" dy="0.82">art. On 429/timeout, leave anchor body as-is (next extend will retry trigger)</tspan></text>
<line class="assoc" x1="30.50" y1="58.50" x2="31.50" y2="58.50"/>
<rect class="action" x="31.50" y="57.07" width="22.50" height="2.86"/>
<text class="action-label" x="42.75" y="57.68"><tspan x="42.75" dy="0">Non-codex path: invoke Hybrid.runHybridLlm with priorAnchor as input; STEP</tspan><tspan x="42.75" dy="0.82">3 in-place update overwrites narrative-extended body with LLM summary. S</tspan><tspan x="42.75" dy="0.82">taleness check on completion (interloper anchor → leave stub as new active)</tspan></text>
<line class="assoc" x1="2.00" y1="67.50" x2="3.00" y2="67.50"/>
<rect class="action" x="3.00" y="66.07" width="22.50" height="2.86"/>
<text class="action-label" x="14.25" y="67.09"><tspan x="14.25" dy="0">Release hybridEnrichInFlight lock; emit telemetry compaction.recompres</tspan><tspan x="14.25" dy="0.82">sed with {provider, kind, inputTokens, outputTokens, latencyMs, result}</tspan></text>
<line class="assoc" x1="59.00" y1="76.50" x2="60.00" y2="76.50"/>
<rect class="action" x="60.00" y="75.07" width="22.50" height="2.86"/>
<text class="action-label" x="71.25" y="75.68"><tspan x="71.25" dy="0">Next runloop iter render path: filterCompacted slices at anchor[n+1]; transformPostAncho</tspan><tspan x="71.25" dy="0.82">rTail v7 walks remaining messages, replacing each completed/error tool part&#x27;s state.output</tspan><tspan x="71.25" dy="0.82">with `[recall_id: &lt;part.id&gt;]` placeholder. In-flight and compaction-bearing assistants exempt</tspan></text>
<line class="assoc" x1="59.00" y1="83.50" x2="60.00" y2="83.50"/>
<rect class="action" x="60.00" y="82.07" width="22.50" height="2.86"/>
<text class="action-label" x="71.25" y="82.68"><tspan x="71.25" dy="0">LLM call fires with: [anchor body containing redacted-dialog history] + [p</tspan><tspan x="71.25" dy="0.82">ost-anchor stream with tool payloads redacted] + [Spec 1 replayed unans</tspan><tspan x="71.25" dy="0.82">wered user msg if present]. Model has full prior context + current question</tspan></text>
<line class="assoc" x1="87.50" y1="94.50" x2="88.50" y2="94.50"/>
<rect class="action" x="88.50" y="93.07" width="22.50" height="2.86"/>
<text class="action-label" x="99.75" y="93.68"><tspan x="99.75" dy="0">Recall: working-cache.deriveLedger walks Session.messages, finds</tspan><tspan x="99.75" dy="0.82">part with id == requested part_id; returns state.output from sto</tspan><tspan x="99.75" dy="0.82">rage (source of truth retained even after anchor body redaction)</tspan></text>
