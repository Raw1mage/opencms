<rect class="action" x="27.70" y="26.07" width="18.70" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="37.05" y="27.09"><tspan x="37.05" dy="0">Run classifier on streamStateSnapshot + requestOptionsShape;</tspan><tspan x="37.05" dy="0.82">derive {causeFamily, recoveryAction, suspectParams, logSequence}</tspan></text>
<line class="assoc" x1="26.70" y1="38.50" x2="27.70" y2="38.50"/>
<rect class="action" x="27.70" y="37.07" width="18.70" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="37.05" y="37.68"><tspan x="37.05" dy="0">Persist log entry: append JSONL line to &lt;state&gt;/codex/</tspan><tspan x="37.05" dy="0.82">empty-turns.jsonl AND publish bus event on codex.emptyTurn;</tspan><tspan x="37.05" dy="0.82">on write failure swallow and emit console.error breadcrumb</tspan></text>
<line class="assoc" x1="26.70" y1="49.50" x2="27.70" y2="49.50"/>
<rect class="action" x="27.70" y="48.07" width="18.70" height="2.86" rx="0.45" ry="0.45"/>
