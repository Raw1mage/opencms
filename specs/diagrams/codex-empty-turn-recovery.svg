<line class="assoc" x1="2.00" y1="60.50" x2="3.00" y2="60.50"/>
<rect class="action" x="3.00" y="59.07" width="18.70" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="12.35" y="60.09"><tspan x="12.35" dy="0">Retry: WS reopens with same body; flip retryAttempted=true; cap at</tspan><tspan x="12.35" dy="0.82">one attempt (DD-7); state.usage and counters reset for new attempt</tspan></text>
<line class="assoc" x1="26.70" y1="60.50" x2="27.70" y2="60.50"/>
<rect class="action" x="27.70" y="59.07" width="18.70" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="37.05" y="59.68"><tspan x="37.05" dy="0">Synthesize text part from accumulated deltas</tspan><tspan x="37.05" dy="0.82">(DORMANT: no current cause family selects this;</tspan><tspan x="37.05" dy="0.82">reserved for future codex shape changes per DD-8)</tspan></text>
<line class="assoc" x1="26.70" y1="77.50" x2="27.70" y2="77.50"/>
<rect class="action" x="27.70" y="76.07" width="18.70" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="37.05" y="76.68"><tspan x="37.05" dy="0">A3 emits finish part with providerMetadata.openai.emptyTurnClassification;</tspan><tspan x="37.05" dy="0.82">A6 (runloop empty-response guard) fires broad question-mark nudge per</tspan><tspan x="37.05" dy="0.82">D-4 and attaches classification metadata to the synthetic message</tspan></text>
<line class="assoc" x1="51.40" y1="27.50" x2="52.40" y2="27.50"/>
