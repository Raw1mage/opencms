<text class="action-label" x="43.86" y="52.68"><tspan x="43.86" dy="0">Emit finish part with finishReason + providerMetadata.openai.em</tspan><tspan x="43.86" dy="0.82">ptyTurnClassification; no exception ever leaves codex provider p</tspan><tspan x="43.86" dy="0.82">ackage (INV-01 preserved; DD-2 closes the leak that violated it)</tspan></text>
