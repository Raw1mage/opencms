<text class="action-label" x="73.10" y="11.68"><tspan x="73.10" dy="0">DD-1: derivePredictedCacheMiss(sessionExec, lastFinished) return</tspan><tspan x="73.10" dy="0.82">s hit/miss/unknown based on observable cache.read; sticky continua</tspan><tspan x="73.10" dy="0.82">tionInvalidatedAt no longer forces miss when cache evidence is alive</tspan></text>
