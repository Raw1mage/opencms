<rect class="action" x="61.48" y="20.07" width="23.24" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="73.10" y="20.68"><tspan x="73.10" dy="0">WS streaming via transport-ws.ts wsRequest; observes frames; mutates ws</tspan><tspan x="73.10" dy="0.82">Obs (frameCount, terminalEventReceived, wsCloseCode, wsCloseReason, wsE</tspan><tspan x="73.10" dy="0.82">rrorReason); SSE pipeline consumes frames in parallel emitting LMv2 parts</tspan></text>
<line class="assoc" x1="31.24" y1="30.50" x2="32.24" y2="30.50"/>
<rect class="action" x="32.24" y="29.07" width="23.24" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="43.86" y="29.68"><tspan x="43.86" dy="0">Classify empty turn; predicate ladder selects causeFamily and recove</tspan><tspan x="43.86" dy="0.82">ryAction; ws_no_frames now covers both clean close-without-frame</tspan><tspan x="43.86" dy="0.82">s and onerror-without-frames cases (wsErrorReason discriminates)</tspan></text>
<line class="assoc" x1="31.24" y1="37.50" x2="32.24" y2="37.50"/>
<rect class="action" x="32.24" y="36.07" width="23.24" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="43.86" y="37.09"><tspan x="43.86" dy="0">Persist forensic evidence: empty-turn-log appends JSONL line including ws</tspan><tspan x="43.86" dy="0.82">ErrorReason field; non-blocking on file write failure (CET-001 breadcrumb)</tspan></text>
<line class="assoc" x1="31.24" y1="44.50" x2="32.24" y2="44.50"/>
<rect class="action" x="32.24" y="43.07" width="23.24" height="2.86" rx="0.45" ry="0.45"/>
