<line class="assoc" x1="22.00" y1="5.50" x2="23.00" y2="5.50"/>
<rect class="action" x="23.00" y="4.07" width="4.00" height="2.86"/>
<text class="action-label" x="25.00" y="4.68"><tspan x="25.00" dy="0">詢問問題</tspan><tspan x="25.00" dy="0.82">區塊並等</tspan><tspan x="25.00" dy="0.82">待回覆</tspan></text>
