<path class="edge edge-arrow" d="M 26.78 28.00 L 26.78 30.00"/>
<path class="edge edge-arrow" d="M 26.78 30.00 L 26.78 34.00"/>
<path class="edge edge-arrow" d="M 10.00 30.00 L 10.00 34.00"/>
<path class="edge" d="M 26.78 37.00 L 26.78 39.00"/>
<path class="edge edge-arrow" d="M 26.78 39.00 L 26.78 43.00"/>
<path class="edge" d="M 26.78 46.00 L 26.78 48.00"/>
<path class="edge edge-arrow" d="M 26.78 48.00 L 26.78 50.00"/>
<path class="edge" d="M 10.00 37.00 L 10.00 39.00"/>
<path class="edge edge-arrow" d="M 10.00 39.00 L 10.00 40.50 Q 10.00 41.00 9.50 41.00 L 4.50 41.00 Q 4.00 41.00 4.00 40.50 L 4.00 2.50 Q 4.00 2.00 4.50 2.00 L 26.28 2.00 Q 26.78 2.00 26.78 2.50 L 26.78 4.00"/>
<rect class="step" x="24.78" y="4.00" width="4.00" height="3.00" rx="0.35" ry="0.35"/>
<rect class="step-inner" x="25.03" y="4.25" width="3.50" height="2.50" rx="0.22" ry="0.22"/>
<text class="label" x="26.78" y="5.50">0</text>
<rect class="step" x="24.78" y="11.00" width="4.00" height="3.00" rx="0.35" ry="0.35"/>
<text class="label" x="26.78" y="12.50">1</text>
<rect class="step" x="24.78" y="18.00" width="4.00" height="3.00" rx="0.35" ry="0.35"/>
<text class="label" x="26.78" y="19.50">2</text>
<rect class="step" x="24.78" y="25.00" width="4.00" height="3.00" rx="0.35" ry="0.35"/>
<text class="label" x="26.78" y="26.50">3</text>
<rect class="step" x="24.78" y="34.00" width="4.00" height="3.00" rx="0.35" ry="0.35"/>
<text class="label" x="26.78" y="35.50">4</text>
<rect class="step" x="24.78" y="43.00" width="4.00" height="3.00" rx="0.35" ry="0.35"/>
<text class="label" x="26.78" y="44.50">5</text>
<rect class="step" x="24.78" y="50.00" width="4.00" height="3.00" rx="0.35" ry="0.35"/>
<text class="label" x="26.78" y="51.50">6</text>
<rect class="step" x="8.00" y="34.00" width="4.00" height="3.00" rx="0.35" ry="0.35"/>
<text class="label" x="10.00" y="35.50">7</text>
<line class="assoc" x1="28.78" y1="5.50" x2="29.78" y2="5.50"/>
<rect class="action" x="29.78" y="4.07" width="10.78" height="2.86"/>
<text class="action-label" x="35.17" y="5.09"><tspan x="35.17" dy="0">Serve Session reads 來自 legacy direc</tspan><tspan x="35.17" dy="0.82">tory layout (&lt;sid&gt;/messages/&lt;mid&gt;/...).</tspan></text>
<line class="assoc" x1="28.78" y1="12.50" x2="29.78" y2="12.50"/>
<rect class="action" x="29.78" y="11.07" width="10.78" height="2.86"/>
<text class="action-label" x="35.17" y="12.09"><tspan x="35.17" dy="0">Read all legacy messages 與 parts 進</tspan><tspan x="35.17" dy="0.82">入 memory while holding daemon 閒置.</tspan></text>
<line class="assoc" x1="28.78" y1="19.50" x2="29.78" y2="19.50"/>
<rect class="action" x="29.78" y="18.07" width="10.78" height="2.86"/>
<text class="action-label" x="35.17" y="18.68"><tspan x="35.17" dy="0">Create &lt;sid&gt;.db.tmp; apply schema</tspan><tspan x="35.17" dy="0.82">v1; insert all messages 與 parts</tspan><tspan x="35.17" dy="0.82">inside single transaction; commit.</tspan></text>
<line class="assoc" x1="28.78" y1="26.50" x2="29.78" y2="26.50"/>
<rect class="action" x="29.78" y="25.07" width="10.78" height="2.86"/>
<text class="action-label" x="35.17" y="25.68"><tspan x="35.17" dy="0">執行 PRAGMA integritycheck 在</tspan><tspan x="35.17" dy="0.82">tmp 檔案 與 assert 訊息 row</tspan><tspan x="35.17" dy="0.82">count equals legacy訊息count.</tspan></text>
<line class="assoc" x1="28.78" y1="35.50" x2="29.78" y2="35.50"/>
<rect class="action" x="29.78" y="34.07" width="10.78" height="2.86"/>
<text class="action-label" x="35.17" y="35.09"><tspan x="35.17" dy="0">Atomically rename &lt;sid&gt;.db.tmp 到 &lt;sid&gt;</tspan><tspan x="35.17" dy="0.82">.db, then delete legacy &lt;sid&gt;/ directory.</tspan></text>
<line class="assoc" x1="28.78" y1="44.50" x2="29.78" y2="44.50"/>
<rect class="action" x="29.78" y="43.07" width="10.78" height="2.86"/>
<text class="action-label" x="35.17" y="43.68"><tspan x="35.17" dy="0">Serve Session reads 與 writes 來自 &lt;sid</tspan><tspan x="35.17" dy="0.82">&gt;.db 透過 SqliteStore + ConnectionPool. W</tspan><tspan x="35.17" dy="0.82">rites 是 依-訊息 transactions 在 WAL.</tspan></text>
<line class="assoc" x1="28.78" y1="51.50" x2="29.78" y2="51.50"/>
<rect class="action" x="29.78" y="50.07" width="10.78" height="2.86"/>
<text class="action-label" x="35.17" y="50.68"><tspan x="35.17" dy="0">Refuse 到 load Session 與 發布 Ses</tspan><tspan x="35.17" dy="0.82">sion.儲存.corrupted Bus 事件. Dae</tspan><tspan x="35.17" dy="0.82">mon awaits 使用者-driven recovery.</tspan></text>
<line class="assoc" x1="12.00" y1="35.50" x2="13.00" y2="35.50"/>
<rect class="action" x="13.00" y="34.07" width="10.78" height="2.86"/>
<text class="action-label" x="18.39" y="34.68"><tspan x="18.39" dy="0">Delete &lt;sid&gt;.db.tmp (partial migration). Le</tspan><tspan x="18.39" dy="0.82">gacy &lt;sid&gt;/ remains 來源 的 truth. Reque</tspan><tspan x="18.39" dy="0.82">ue Session 供 下一個 閒置-sweep tick.</tspan></text>
<line class="gate" x1="25.78" y1="9.00" x2="27.78" y2="9.00"/>
<text class="gate-label" x="28.18" y="9.00"><tspan x="28.18" dy="0">legacydirectorypresent AND sqlitedbabsent</tspan></text>
<line class="gate" x1="25.78" y1="16.00" x2="27.78" y2="16.00"/>
<text class="gate-label-left" x="25.38" y="16.00"><tspan x="25.38" dy="0">閒置sweeptickfired AND 無activewrites在window AND 不yetmigrated</tspan></text>
<line class="gate" x1="25.78" y1="23.00" x2="27.78" y2="23.00"/>
<text class="gate-label" x="28.18" y="23.00"><tspan x="28.18" dy="0">legacyread完成</tspan></text>
<line class="gate" x1="8.00" y1="30.00" x2="28.78" y2="30.00"/>
<line class="gate" x1="25.78" y1="39.00" x2="27.78" y2="39.00"/>
<text class="gate-label" x="28.18" y="39.00"><tspan x="28.18" dy="0">integritycheckok AND rowcountmatcheslegacy</tspan></text>
<line class="gate" x1="25.78" y1="48.00" x2="27.78" y2="48.00"/>
<text class="gate-label" x="28.18" y="48.00"><tspan x="28.18" dy="0">renameatomicdone AND legacydirdeleted</tspan></text>
<line class="gate" x1="9.00" y1="39.00" x2="11.00" y2="39.00"/>
<text class="gate-label" x="11.40" y="38.32"><tspan x="11.40" dy="0">integritycheckfails OR ro</tspan><tspan x="11.40" dy="0.68">wcountmismatch OR daem</tspan><tspan x="11.40" dy="0.68">oncrashedbeforerename</tspan></text>
<line class="gate" x1="25.78" y1="32.00" x2="27.78" y2="32.00"/>
<text class="gate-label" x="28.18" y="32.00"><tspan x="28.18" dy="0">tmpwritecommitted AND fsync已完成</tspan></text>
<line class="gate" x1="9.00" y1="32.00" x2="11.00" y2="32.00"/>
</svg>