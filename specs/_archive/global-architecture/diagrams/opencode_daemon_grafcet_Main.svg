<rect class="action" x="26.17" y="4.07" width="7.17" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="29.76" y="4.68"><tspan x="29.76" dy="0">Daemon 初始化，嘗</tspan><tspan x="29.76" dy="0.82">試取得 GatewayLoc</tspan><tspan x="29.76" dy="0.82">k (寫入 daemon.pid)</tspan></text>
<line class="assoc" x1="25.17" y1="14.50" x2="26.17" y2="14.50"/>
<rect class="action" x="26.17" y="13.07" width="7.17" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="29.76" y="13.68"><tspan x="29.76" dy="0">註冊信號處理器：SIG</tspan><tspan x="29.76" dy="0.82">TERM→drain, SIGINT→im</tspan><tspan x="29.76" dy="0.82">mediate, SIGUSR1→restart</tspan></text>
<line class="assoc" x1="12.00" y1="14.50" x2="13.00" y2="14.50"/>
<rect class="action" x="13.00" y="13.07" width="7.17" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="16.59" y="14.09"><tspan x="16.59" dy="0">記錄鎖衝突，回報啟</tspan><tspan x="16.59" dy="0.82">動失敗，process 結束</tspan></text>
<line class="assoc" x1="25.17" y1="21.50" x2="26.17" y2="21.50"/>
<rect class="action" x="26.17" y="20.07" width="7.17" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="29.76" y="20.68"><tspan x="29.76" dy="0">Daemon running：監聽</tspan><tspan x="29.76" dy="0.82">Unix socket，接受命令</tspan><tspan x="29.76" dy="0.82">，分派至 Lane 佇列</tspan></text>
<line class="assoc" x1="38.34" y1="30.50" x2="39.34" y2="30.50"/>
<rect class="action" x="39.34" y="29.07" width="7.17" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="42.93" y="29.68"><tspan x="42.93" dy="0">進入 drain 模式：</tspan><tspan x="42.93" dy="0.82">停止接受新請求</tspan><tspan x="42.93" dy="0.82">，等待所有車道 idle</tspan></text>
<line class="assoc" x1="12.00" y1="30.50" x2="13.00" y2="30.50"/>
<rect class="action" x="13.00" y="29.07" width="7.17" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="16.59" y="29.68"><tspan x="16.59" dy="0">Restart 序列：drain →</tspan><tspan x="16.59" dy="0.82">release lock → re-acquire</tspan><tspan x="16.59" dy="0.82">→ re-init，generation+1</tspan></text>
<line class="assoc" x1="25.17" y1="30.50" x2="26.17" y2="30.50"/>
<rect class="action" x="26.17" y="29.07" width="7.17" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="29.76" y="29.68"><tspan x="29.76" dy="0">SIGINT：強制終止</tspan><tspan x="29.76" dy="0.82">所有 process，立即</tspan><tspan x="29.76" dy="0.82">釋放鎖，清理退出</tspan></text>
<line class="assoc" x1="25.17" y1="39.50" x2="26.17" y2="39.50"/>
<rect class="action" x="26.17" y="38.07" width="7.17" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="29.76" y="38.68"><tspan x="29.76" dy="0">Graceful 完成：釋放</tspan><tspan x="29.76" dy="0.82">GatewayLock，清理 d</tspan><tspan x="29.76" dy="0.82">aemon.pid/json，退出</tspan></text>
<line class="assoc" x1="38.34" y1="39.50" x2="39.34" y2="39.50"/>
<rect class="action" x="39.34" y="38.07" width="7.17" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="42.93" y="38.68"><tspan x="42.93" dy="0">Drain timeout 到期：</tspan><tspan x="42.93" dy="0.82">強制停止剩餘車道</tspan><tspan x="42.93" dy="0.82">，釋放鎖，退出</tspan></text>
