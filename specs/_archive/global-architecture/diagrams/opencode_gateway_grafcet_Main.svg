<line class="gate" x1="52.24" y1="47.00" x2="54.24" y2="47.00"/>
<text class="gate-label" x="54.64" y="47.00"><tspan x="54.64" dy="0">EPOLLHUP 或 EPOLLERR 或 splice 錯誤</tspan></text>
<line class="gate" x1="12.31" y1="18.00" x2="14.31" y2="18.00"/>
<text class="gate-label-left" x="11.91" y="18.00"><tspan x="11.91" dy="0">POST /auth/login（需 PAM 認證）</tspan></text>
<line class="gate" x1="52.24" y1="18.00" x2="54.24" y2="18.00"/>
<text class="gate-label-left" x="51.84" y="18.00"><tspan x="51.84" dy="0">含 JWT cookie（需身分驗證）</tspan></text>
<line class="gate" x1="-1.00" y1="27.00" x2="1.00" y2="27.00"/>
<text class="gate-label-left" x="-1.40" y="27.00"><tspan x="-1.40" dy="0">PAM 成功：簽發 JWT</tspan></text>
<line class="gate" x1="12.31" y1="27.00" x2="14.31" y2="27.00"/>
<text class="gate-label-left" x="11.91" y="27.00"><tspan x="11.91" dy="0">PAM 失敗或 rate limited：拒絕</tspan></text>
<line class="gate" x1="52.24" y1="31.00" x2="54.24" y2="31.00"/>
<text class="gate-label-left" x="51.84" y="31.00"><tspan x="51.84" dy="0">身分已驗證：尋找或產生 daemon</tspan></text>
<line class="gate" x1="38.93" y1="31.00" x2="40.93" y2="31.00"/>
<text class="gate-label-left" x="38.53" y="31.00"><tspan x="38.53" dy="0">JWT 無效：拒絕 403</tspan></text>
<line class="gate" x1="52.24" y1="40.00" x2="54.24" y2="40.00"/>
<text class="gate-label-left" x="51.84" y="40.00"><tspan x="51.84" dy="0">daemon 就緒，socket 可連線</tspan></text>
<line class="gate" x1="38.93" y1="40.00" x2="40.93" y2="40.00"/>
<text class="gate-label-left" x="38.53" y="40.00"><tspan x="38.53" dy="0">daemon 啟動失敗或逾時</tspan></text>
