<line class="assoc" x1="28.62" y1="5.50" x2="29.62" y2="5.50"/>
<rect class="action" x="29.62" y="4.07" width="7.31" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="33.27" y="4.68"><tspan x="33.27" dy="0">Gateway 於 TCP po</tspan><tspan x="33.27" dy="0.82">rt 1080 監聽，ep</tspan><tspan x="33.27" dy="0.82">oll 事件迴圈就緒</tspan></text>
<line class="assoc" x1="28.62" y1="12.50" x2="29.62" y2="12.50"/>
<rect class="action" x="29.62" y="11.07" width="7.31" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="33.27" y="11.68"><tspan x="33.27" dy="0">配置 PendingRequest 緩</tspan><tspan x="33.27" dy="0.82">衝區，累積 HTTP 位</tspan><tspan x="33.27" dy="0.82">元組直到 header 完成</tspan></text>
<line class="assoc" x1="15.31" y1="21.50" x2="16.31" y2="21.50"/>
<rect class="action" x="16.31" y="20.07" width="7.31" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="19.97" y="20.68"><tspan x="19.97" dy="0">檢查 rate limit，</tspan><tspan x="19.97" dy="0.82">產生 PAM auth pth</tspan><tspan x="19.97" dy="0.82">read，驗證憑證</tspan></text>
<line class="assoc" x1="55.24" y1="21.50" x2="56.24" y2="21.50"/>
<rect class="action" x="56.24" y="20.07" width="7.31" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="59.90" y="20.68"><tspan x="59.90" dy="0">解碼 JWT payload，驗證</tspan><tspan x="59.90" dy="0.82">sub + exp + HMAC 簽章，</tspan><tspan x="59.90" dy="0.82">透過 getpwnam 解析 UID</tspan></text>
<line class="assoc" x1="2.00" y1="34.50" x2="3.00" y2="34.50"/>
<rect class="action" x="3.00" y="33.07" width="7.31" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="6.66" y="33.68"><tspan x="6.66" dy="0">簽發 JWT HttpOnl</tspan><tspan x="6.66" dy="0.82">y cookie，回應 S</tspan><tspan x="6.66" dy="0.82">et-Cookie 與重導</tspan></text>
<line class="assoc" x1="15.31" y1="34.50" x2="16.31" y2="34.50"/>
<rect class="action" x="16.31" y="33.07" width="7.31" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="19.97" y="34.09"><tspan x="19.97" dy="0">回傳錯誤回應 (401/</tspan><tspan x="19.97" dy="0.82">403/429)，關閉連線</tspan></text>
<line class="assoc" x1="55.24" y1="34.50" x2="56.24" y2="34.50"/>
<rect class="action" x="56.24" y="33.07" width="7.31" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="59.90" y="33.68"><tspan x="59.90" dy="0">嘗試從 discovery file 收</tspan><tspan x="59.90" dy="0.82">養，否則 fork+setuid+ex</tspan><tspan x="59.90" dy="0.82">ecvp 產生 per-user daemon</tspan></text>
<line class="assoc" x1="41.93" y1="34.50" x2="42.93" y2="34.50"/>
<rect class="action" x="42.93" y="33.07" width="7.31" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="46.59" y="34.09"><tspan x="46.59" dy="0">清除過期 JWT cooki</tspan><tspan x="46.59" dy="0.82">e，重導至登入頁</tspan></text>
<line class="assoc" x1="55.24" y1="43.50" x2="56.24" y2="43.50"/>
<rect class="action" x="56.24" y="42.07" width="7.31" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="59.90" y="42.68"><tspan x="59.90" dy="0">建立 splice proxy：連接</tspan><tspan x="59.90" dy="0.82">socket、建立 pipe pairs、</tspan><tspan x="59.90" dy="0.82">註冊 epoll、雙向轉發</tspan></text>
<line class="assoc" x1="41.93" y1="43.50" x2="42.93" y2="43.50"/>
<rect class="action" x="42.93" y="42.07" width="7.31" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="46.59" y="43.09"><tspan x="46.59" dy="0">回傳 daemon 不可</tspan><tspan x="46.59" dy="0.82">用錯誤給客戶端</tspan></text>
<line class="assoc" x1="55.24" y1="50.50" x2="56.24" y2="50.50"/>
<rect class="action" x="56.24" y="49.07" width="7.31" height="2.86" rx="0.45" ry="0.45"/>
<text class="action-label" x="59.90" y="49.68"><tspan x="59.90" dy="0">EPOLL_CTL_DEL 雙 fd，</tspan><tspan x="59.90" dy="0.82">關閉所有 fd 與 pipe，</tspan><tspan x="59.90" dy="0.82">釋放 slot，遞減計數器</tspan></text>
