<rect class="action" x="18.00" y="4.07" width="18.83" height="2.86"/>
<text class="action-label" x="27.41" y="4.68"><tspan x="27.41" dy="0">Store has 無 項目 供 this sid; reducer waiting 供 first Sessio</tspan><tspan x="27.41" dy="0.82">n-scoped SSE 事件. Once first 事件 arrives, reducer creates</tspan><tspan x="27.41" dy="0.82">項目 使用 已收到於 = Date.now() 與 transitions 到 Fresh.</tspan></text>
<line class="assoc" x1="17.00" y1="16.50" x2="18.00" y2="16.50"/>
<rect class="action" x="18.00" y="15.07" width="18.83" height="2.86"/>
<text class="action-label" x="27.41" y="15.68"><tspan x="27.41" dy="0">項目 exists; fidelity = fresh. Any further Session-scoped 事件 供 this si</tspan><tspan x="27.41" dy="0.82">d continuously refreshes 已收到於 = Date.now() 透過 reducer (步驟-i</tspan><tspan x="27.41" dy="0.82">nternal side effect, 無 transition). UI memo renders normally 不 stale hint.</tspan></text>
<line class="assoc" x1="17.00" y1="23.50" x2="18.00" y2="23.50"/>
<rect class="action" x="18.00" y="22.07" width="18.83" height="2.86"/>
<text class="action-label" x="27.41" y="22.68"><tspan x="27.41" dy="0">項目 exists but soft threshold exceeded; fidelity = stale. UI memo ren</tspan><tspan x="27.41" dy="0.82">ders &#x27;updated N ago&#x27; badge while still showing content. Either 事件 ar</tspan><tspan x="27.41" dy="0.82">rival rolls 回到 到 Fresh, 或 hard threshold advances 到 HardStale.</tspan></text>
<line class="assoc" x1="41.83" y1="34.50" x2="42.83" y2="34.50"/>
<rect class="action" x="42.83" y="33.07" width="18.83" height="2.86"/>
<text class="action-label" x="52.24" y="33.68"><tspan x="52.24" dy="0">Hard threshold exceeded; fidelity = hard-stale. UI m</tspan><tspan x="52.24" dy="0.82">emo degrades 渲染: card grayed / collapsed / elaps</tspan><tspan x="52.24" dy="0.82">ed timer frozen. 僅 事件 arrival 返回 到 Fresh.</tspan></text>
