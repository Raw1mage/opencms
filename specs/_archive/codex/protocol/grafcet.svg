<rect class="action" x="30.25" y="4.07" width="11.25" height="2.86"/>
<text class="action-label" x="35.88" y="5.09"><tspan x="35.88" dy="0">Session awaiting 使用者 輸入. WS ma</tspan><tspan x="35.88" dy="0.82">y 是 connected (warm) 或 disconnected.</tspan></text>
<line class="assoc" x1="29.25" y1="12.50" x2="30.25" y2="12.50"/>
<rect class="action" x="30.25" y="11.07" width="11.25" height="2.86"/>
<text class="action-label" x="35.88" y="12.09"><tspan x="35.88" dy="0">OAuth token valid, originator</tspan><tspan x="35.88" dy="0.82">set, installationid available.</tspan></text>
<line class="assoc" x1="29.25" y1="19.50" x2="30.25" y2="19.50"/>
<rect class="action" x="30.25" y="18.07" width="11.25" height="2.86"/>
<text class="action-label" x="35.88" y="18.68"><tspan x="35.88" dy="0">responsesapi請求 body assembled: inst</tspan><tspan x="35.88" dy="0.82">ructions, 輸入, tools, reasoning, 文字</tspan><tspan x="35.88" dy="0.82">, clientmetadata, 上下文management.</tspan></text>
<line class="assoc" x1="29.25" y1="26.50" x2="30.25" y2="26.50"/>
<rect class="action" x="30.25" y="25.07" width="11.25" height="2.86"/>
<text class="action-label" x="35.88" y="25.68"><tspan x="35.88" dy="0">Incremental 輸入 delta calculated against p</tspan><tspan x="35.88" dy="0.82">revious 請求. If WS Session invalid 或 請</tspan><tspan x="35.88" dy="0.82">求 shape changed, falls 回到 到 full 輸入.</tspan></text>
<line class="assoc" x1="29.25" y1="35.50" x2="30.25" y2="35.50"/>
<rect class="action" x="30.25" y="34.07" width="11.25" height="2.86"/>
<text class="action-label" x="35.88" y="34.68"><tspan x="35.88" dy="0">Transport chosen: WS (primary), HTTP SS</tspan><tspan x="35.88" dy="0.82">E (fallback), 或 WebRTC (realtime). Head</tspan><tspan x="35.88" dy="0.82">ers attached including x-codex-window-id.</tspan></text>
<line class="assoc" x1="29.25" y1="42.50" x2="30.25" y2="42.50"/>
<rect class="action" x="30.25" y="41.07" width="11.25" height="2.86"/>
<text class="action-label" x="35.88" y="42.09"><tspan x="35.88" dy="0">請求 sent 在 selected transpo</tspan><tspan x="35.88" dy="0.82">rt. Awaiting first 回應 frame.</tspan></text>
<line class="assoc" x1="29.25" y1="51.50" x2="30.25" y2="51.50"/>
<rect class="action" x="30.25" y="50.07" width="11.25" height="2.86"/>
<text class="action-label" x="35.88" y="50.68"><tspan x="35.88" dy="0">回應 事件 streaming: 文字</tspan><tspan x="35.88" dy="0.82">deltas, 工具 calls, reasoning it</tspan><tspan x="35.88" dy="0.82">ems. Token usage accumulating.</tspan></text>
<line class="assoc" x1="29.25" y1="72.50" x2="30.25" y2="72.50"/>
<rect class="action" x="30.25" y="71.07" width="11.25" height="2.86"/>
<text class="action-label" x="35.88" y="72.09"><tspan x="35.88" dy="0">回應 串流 ended. Final token usage</tspan><tspan x="35.88" dy="0.82">known. 回應id captured 供 延續.</tspan></text>
<line class="assoc" x1="46.50" y1="83.50" x2="47.50" y2="83.50"/>
<rect class="action" x="47.50" y="82.07" width="11.25" height="2.86"/>
<text class="action-label" x="53.12" y="83.09"><tspan x="53.12" dy="0">Token usage exceeds compactthreshol</tspan><tspan x="53.12" dy="0.82">d. 壓縮 initiated (remote 或 inline).</tspan></text>
<line class="assoc" x1="46.50" y1="90.50" x2="47.50" y2="90.50"/>
<rect class="action" x="47.50" y="89.07" width="11.25" height="2.86"/>
<text class="action-label" x="53.12" y="89.68"><tspan x="53.12" dy="0">History replaced 使用 compac</tspan><tspan x="53.12" dy="0.82">ted summary. WS Session rese</tspan><tspan x="53.12" dy="0.82">t. Window generation advanced.</tspan></text>
<line class="assoc" x1="12.00" y1="72.50" x2="13.00" y2="72.50"/>
<rect class="action" x="13.00" y="71.07" width="11.25" height="2.86"/>
<text class="action-label" x="18.62" y="71.68"><tspan x="18.62" dy="0">Transport 錯誤, 驗證 failure</tspan><tspan x="18.62" dy="0.82">, 或 速率限制. May trigger</tspan><tspan x="18.62" dy="0.82">WS→HTTP fallback 或 重試.</tspan></text>
