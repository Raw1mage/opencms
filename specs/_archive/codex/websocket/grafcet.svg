<rect class="action" x="44.72" y="4.07" width="14.86" height="2.86"/>
<text class="action-label" x="52.15" y="4.68"><tspan x="52.15" dy="0">Evaluate transport availability: check Pr</tspan><tspan x="52.15" dy="0.82">ovider.supportswebsockets AND NOT dis</tspan><tspan x="52.15" dy="0.82">ablewebsockets AND NOT SSE FIXTURE</tspan></text>
<line class="assoc" x1="43.72" y1="12.50" x2="44.72" y2="12.50"/>
<rect class="action" x="44.72" y="11.07" width="14.86" height="2.86"/>
<text class="action-label" x="52.15" y="12.09"><tspan x="52.15" dy="0">Select WS transport 路徑: 呼叫 串</tspan><tspan x="52.15" dy="0.82">流responseswebsocket(warmup=false)</tspan></text>
<line class="assoc" x1="43.72" y1="23.50" x2="44.72" y2="23.50"/>
<rect class="action" x="44.72" y="22.07" width="14.86" height="2.86"/>
<text class="action-label" x="52.15" y="23.09"><tspan x="52.15" dy="0">Check cached WS connection: inspect websocket</tspan><tspan x="52.15" dy="0.82">Session.connection 供 existing open connection</tspan></text>
<line class="assoc" x1="43.72" y1="40.50" x2="44.72" y2="40.50"/>
<rect class="action" x="44.72" y="39.07" width="14.86" height="2.86"/>
<text class="action-label" x="52.15" y="39.68"><tspan x="52.15" dy="0">Establish new WS connection: 建置 URL (21),</tspan><tspan x="52.15" dy="0.82">建置 headers (22), TLS handshake 使用 pe</tspan><tspan x="52.15" dy="0.82">rmessage-deflate, capture 回應 headers (24)</tspan></text>
<line class="assoc" x1="22.86" y1="40.50" x2="23.86" y2="40.50"/>
<rect class="action" x="23.86" y="39.07" width="14.86" height="2.86"/>
<text class="action-label" x="31.29" y="40.09"><tspan x="31.29" dy="0">Verify 帳號 比對: compare current 帳號id 使用</tspan><tspan x="31.29" dy="0.82">connection.帳號id. If mismatch: close 與 reconnect</tspan></text>
<line class="assoc" x1="43.72" y1="65.50" x2="44.72" y2="65.50"/>
<rect class="action" x="44.72" y="64.07" width="14.86" height="2.86"/>
<text class="action-label" x="52.15" y="64.68"><tspan x="52.15" dy="0">Prepare 請求: detect incremental 前綴 比對</tspan><tspan x="52.15" dy="0.82">透過 get incremental items(). If 比對: set p</tspan><tspan x="52.15" dy="0.82">revious回應id + delta 輸入. Else: full 請求</tspan></text>
<line class="assoc" x1="43.72" y1="72.50" x2="44.72" y2="72.50"/>
<rect class="action" x="44.72" y="71.07" width="14.86" height="2.86"/>
<text class="action-label" x="52.15" y="72.09"><tspan x="52.15" dy="0">Send 請求 frame: serialize responsesws請求 到 J</tspan><tspan x="52.15" dy="0.82">SON, send 作為 文字 frame 透過 ws串流.send()</tspan></text>
<line class="assoc" x1="43.72" y1="79.50" x2="44.72" y2="79.50"/>
<rect class="action" x="44.72" y="78.07" width="14.86" height="2.86"/>
<text class="action-label" x="52.15" y="78.68"><tspan x="52.15" dy="0">串流 回應 loop: receive frames 使用 閒置 timeout. 解</tspan><tspan x="52.15" dy="0.82">析 each: check wrapped錯誤事件 first, then responses</tspan><tspan x="52.15" dy="0.82">串流事件. Handle ratelimits, track 模型, 發出 事件</tspan></text>
<line class="assoc" x1="64.58" y1="94.50" x2="65.58" y2="94.50"/>
<rect class="action" x="65.58" y="93.07" width="14.86" height="2.86"/>
<text class="action-label" x="73.01" y="93.68"><tspan x="73.01" dy="0">Capture last 回應: accumulate 輸出itemdon</tspan><tspan x="73.01" dy="0.82">e items, 取出 回應id 來自 已完成, send</tspan><tspan x="73.01" dy="0.82">last回應 透過 oneshot 供 下一個 回合</tspan></text>
<line class="assoc" x1="64.58" y1="105.50" x2="65.58" y2="105.50"/>
<rect class="action" x="65.58" y="104.07" width="14.86" height="2.86"/>
<text class="action-label" x="73.01" y="105.09"><tspan x="73.01" dy="0">返回 合成 SSE 回應 到 AI SDK. Connec</tspan><tspan x="73.01" dy="0.82">tion remains open 供 下一個 回合 reuse</tspan></text>
<line class="assoc" x1="22.86" y1="23.50" x2="23.86" y2="23.50"/>
<rect class="action" x="23.86" y="22.07" width="14.86" height="2.86"/>
<text class="action-label" x="31.29" y="23.09"><tspan x="31.29" dy="0">Select HTTP fallback 路徑: 呼叫 stream re</tspan><tspan x="31.29" dy="0.82">sponses api(). WS was disabled 或 unavailable</tspan></text>
<line class="assoc" x1="2.00" y1="94.50" x2="3.00" y2="94.50"/>
<rect class="action" x="3.00" y="93.07" width="14.86" height="2.86"/>
<text class="action-label" x="10.43" y="94.09"><tspan x="10.43" dy="0">Handle 426 Upgrade Required: set disablewebsockets=</tspan><tspan x="10.43" dy="0.82">true, reset websocketSession, fall through 到 HTTP</tspan></text>
<line class="assoc" x1="22.86" y1="94.50" x2="23.86" y2="94.50"/>
<rect class="action" x="23.86" y="93.07" width="14.86" height="2.86"/>
<text class="action-label" x="31.29" y="93.68"><tspan x="31.29" dy="0">Handle 401 Unauthorized: attempt 驗證 recovery 透</tspan><tspan x="31.29" dy="0.82">過 UnauthorizedRecovery 狀態 machine. If success:</tspan><tspan x="31.29" dy="0.82">重試 來自 步驟 3. If exhausted: propagate 錯誤</tspan></text>
<line class="assoc" x1="43.72" y1="94.50" x2="44.72" y2="94.50"/>
<rect class="action" x="44.72" y="93.07" width="14.86" height="2.86"/>
<text class="action-label" x="52.15" y="93.68"><tspan x="52.15" dy="0">Handle 串流 錯誤: check 重試 budget. If retries rem</tspan><tspan x="52.15" dy="0.82">aining: reconnect (步驟 3) 使用 &#x27;Reconnecting N/N&#x27; fe</tspan><tspan x="52.15" dy="0.82">edback. If exhausted: activate HTTP fallback (步驟 10)</tspan></text>
<line class="assoc" x1="22.86" y1="65.50" x2="23.86" y2="65.50"/>
<rect class="action" x="23.86" y="64.07" width="14.86" height="2.86"/>
<text class="action-label" x="31.29" y="64.68"><tspan x="31.29" dy="0">Handle connect failure: check 重試 budget. If</tspan><tspan x="31.29" dy="0.82">retries remaining: 重試 connect (步驟 3). If</tspan><tspan x="31.29" dy="0.82">exhausted: activate HTTP fallback (步驟 10)</tspan></text>
