# OpenCMS server runtime config (Single Source of Truth)
# Install path: /etc/opencode/opencode.cfg
#
# This file is sourced by webctl/systemd scripts, so keep POSIX shell syntax.
#
# -----------------------------------------------------------------------------
# 1) Network / URL
# -----------------------------------------------------------------------------

# Public URL shown in status output and links (does not change bind address).
# Example: https://opencode.example.com
OPENCODE_PUBLIC_URL="https://your-opencode.example.com"

# Backend bind port.
OPENCODE_PORT="1080"

# Backend bind address:
# - 0.0.0.0 = listen on all interfaces
# - 127.0.0.1 = local-only
OPENCODE_HOSTNAME="0.0.0.0"

# Frontend dev server port (used by ./webctl.sh dev-start workflow).
# Production serving still goes through OPENCODE_PORT.
OPENCODE_FRONTEND_DEV_PORT="3000"

# -----------------------------------------------------------------------------
# 2) Frontend bundle
# -----------------------------------------------------------------------------

# Absolute path to built frontend directory (must contain index.html).
# Fail-fast: runtime will return FRONTEND_BUNDLE_MISSING if path is invalid.
OPENCODE_FRONTEND_PATH="/usr/local/share/opencode/frontend"

# -----------------------------------------------------------------------------
# 3) Runtime behaviors
# -----------------------------------------------------------------------------

# 1 = do not auto-open browser on startup.
OPENCODE_WEB_NO_OPEN="1"

# Absolute path to the runtime control script used by authenticated Web restart actions.
# This should point to the repo-detached control wrapper installed on the host.
OPENCODE_WEBCTL_PATH="/etc/opencode/webctl.sh"

# Absolute path to plan-builder / planner artifact templates used by runtime
# plan creation. Production deployments should use the installed host path,
# not repo-local templates.
#
# Renamed 2026-05-12: OPENCODE_PLANNER_TEMPLATE_DIR (legacy) →
# OPENCODE_PLAN_BUILDER_TEMPLATE_DIR. Both point to the same path; the
# legacy name is preserved for the retired planner skill's plan-init.ts
# (in templates/skills/ submodule, kept for legacy /plans/ compatibility).
# Remove the legacy line once that script is retired.
OPENCODE_PLAN_BUILDER_TEMPLATE_DIR="/etc/opencode/specs"
OPENCODE_PLANNER_TEMPLATE_DIR="/etc/opencode/specs"

# 1 = allow global filesystem browsing from Web/TUI file APIs.
# Security note: set to 0 for stricter project-root-only access.
OPENCODE_ALLOW_GLOBAL_FS_BROWSE="1"

# NOTE: The following runtime flags have been migrated to tweaks.cfg
# (daemon reads tweaks at init, no systemd env needed):
#   OPENCODE_DEBUG_LOG                         → debug_log_enabled
#   OPENCODE_LOG_LEVEL                         → log_level  (planned)
#   OPENCODE_WEB_NO_OPEN                       → web_no_open  (planned)
#   OPENCODE_ALLOW_GLOBAL_FS_BROWSE            → allow_global_fs_browse  (planned)
#   OPENCODE_PER_USER_DAEMON_ROUTE_SESSION_TOP → per_user_daemon_route_session_top  (planned)
# Env vars above are kept for backward compat; tweaks.cfg takes priority.

# -----------------------------------------------------------------------------
# 4) Web authentication
# -----------------------------------------------------------------------------
# Auth is PAM-only on Linux. The gateway handles Google OAuth for browser
# login; the daemon verifies credentials via Linux PAM for programmatic access.

# -----------------------------------------------------------------------------
# 5) Gateway (C root daemon)
# -----------------------------------------------------------------------------

# Per-user daemon executable.
# The gateway forks and execs this binary (as the target user) for each
# authenticated user. Switch between dev and prod by changing this value
# and restarting the gateway service.
#
#   prod mode: /usr/local/bin/opencode
#   dev mode:  bun --conditions=browser /path/to/packages/opencode/src/index.ts
OPENCODE_BIN="/usr/local/bin/opencode"

# Gateway listen port (defaults to OPENCODE_PORT if unset).
OPENCODE_GATEWAY_PORT="1080"

# Login page HTML served to unauthenticated users.
OPENCODE_LOGIN_HTML="/usr/local/share/opencode/login.html"
