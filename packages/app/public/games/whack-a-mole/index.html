<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>打地鼠！</title>
    <style>
      :root {
        --grass-light: #7cfc00;
        --grass-dark: #228b22;
        --dirt: #8b4513;
        --dirt-dark: #5c2e00;
        --mole: #6b4226;
        --mole-light: #8b6240;
        --sky: #87ceeb;
        --gold: #ffd700;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", "Noto Sans TC", sans-serif;
        background: linear-gradient(180deg, var(--sky) 0%, #b0e0e6 40%, var(--grass-light) 40%, var(--grass-dark) 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
      }

      /* Clouds */
      .clouds {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .cloud {
        position: absolute;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 50px;
        animation: drift linear infinite;
      }
      .cloud::before,
      .cloud::after {
        content: "";
        position: absolute;
        background: inherit;
        border-radius: 50%;
      }
      .cloud-1 {
        width: 120px;
        height: 40px;
        top: 5%;
        animation-duration: 40s;
      }
      .cloud-1::before {
        width: 50px;
        height: 50px;
        top: -25px;
        left: 20px;
      }
      .cloud-1::after {
        width: 60px;
        height: 60px;
        top: -30px;
        left: 50px;
      }
      .cloud-2 {
        width: 150px;
        height: 45px;
        top: 12%;
        animation-duration: 55s;
        animation-delay: -20s;
      }
      .cloud-2::before {
        width: 55px;
        height: 55px;
        top: -28px;
        left: 25px;
      }
      .cloud-2::after {
        width: 65px;
        height: 65px;
        top: -33px;
        left: 60px;
      }
      .cloud-3 {
        width: 100px;
        height: 35px;
        top: 8%;
        animation-duration: 48s;
        animation-delay: -10s;
      }
      .cloud-3::before {
        width: 45px;
        height: 45px;
        top: -22px;
        left: 15px;
      }
      .cloud-3::after {
        width: 55px;
        height: 55px;
        top: -28px;
        left: 40px;
      }

      @keyframes drift {
        from {
          transform: translateX(-200px);
        }
        to {
          transform: translateX(calc(100vw + 200px));
        }
      }

      #game-container {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      /* HUD */
      #hud {
        display: flex;
        justify-content: space-between;
        width: min(400px, 90vw);
        gap: 12px;
      }
      .hud-item {
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px 18px;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: 700;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        flex: 1;
        text-align: center;
        border: 2px solid rgba(255, 255, 255, 0.2);
      }
      .hud-item.score {
        color: var(--gold);
        border-color: rgba(255, 215, 0, 0.3);
      }
      .hud-item.timer {
        color: #ff6b6b;
        border-color: rgba(255, 107, 107, 0.3);
      }

      /* Game board */
      #board {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        width: min(400px, 90vw);
        aspect-ratio: 1;
        padding: 20px;
        background: linear-gradient(145deg, rgba(34, 139, 34, 0.9), rgba(0, 100, 0, 0.95));
        border-radius: 20px;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.3),
          inset 0 2px 0 rgba(255, 255, 255, 0.1);
        border: 3px solid rgba(255, 255, 255, 0.15);
      }

      .hole {
        position: relative;
        border-radius: 50%;
        overflow: hidden;
        cursor: pointer;
      }

      .hole-inner {
        width: 100%;
        height: 100%;
        background: radial-gradient(ellipse at center, #2a1a00 0%, var(--dirt) 40%, var(--dirt-dark) 70%, #3a1a00 100%);
        border-radius: 50%;
        box-shadow:
          inset 0 8px 20px rgba(0, 0, 0, 0.6),
          0 4px 8px rgba(0, 0, 0, 0.2);
        position: relative;
      }

      .mole {
        position: absolute;
        bottom: -100%;
        left: 50%;
        transform: translateX(-50%);
        width: 70%;
        height: 70%;
        transition: bottom 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: min(60px, 10vw);
        z-index: 2;
        pointer-events: none;
      }
      .mole::before {
        content: "🐹";
        filter: drop-shadow(2px 2px 2px rgba(0, 0, 0, 0.3));
      }

      .mole.active {
        bottom: 10%;
      }
      .mole.hit {
        bottom: 10%;
        animation: hit-bounce 0.3s ease-out;
      }
      .mole.hit::before {
        content: "😵";
      }

      @keyframes hit-bounce {
        0% {
          transform: translateX(-50%) scale(1);
        }
        30% {
          transform: translateX(-50%) scale(1.3) rotate(-10deg);
        }
        60% {
          transform: translateX(-50%) scale(0.9) rotate(10deg);
        }
        100% {
          transform: translateX(-50%) scale(0);
          bottom: -100%;
        }
      }

      /* Whack effect */
      .whack-effect {
        position: absolute;
        pointer-events: none;
        font-size: 1.5rem;
        font-weight: 900;
        color: var(--gold);
        text-shadow:
          2px 2px 0 #000,
          -1px -1px 0 #000;
        animation: score-pop 0.6s ease-out forwards;
        z-index: 10;
      }
      @keyframes score-pop {
        0% {
          opacity: 1;
          transform: translate(-50%, 0) scale(0.5);
        }
        50% {
          opacity: 1;
          transform: translate(-50%, -40px) scale(1.2);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -80px) scale(0.8);
        }
      }

      /* Screen overlays */
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      .overlay.hidden {
        display: none;
      }

      .overlay-box {
        background: linear-gradient(145deg, #2d5016, #1a3a0a);
        border: 3px solid rgba(255, 215, 0, 0.4);
        border-radius: 24px;
        padding: 32px 40px;
        text-align: center;
        max-width: min(380px, 90vw);
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
      }

      .overlay-title {
        font-size: 2.5rem;
        font-weight: 900;
        color: var(--gold);
        margin-bottom: 8px;
        text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.5);
      }
      .overlay-subtitle {
        font-size: 1.1rem;
        color: rgba(255, 255, 255, 0.8);
        margin-bottom: 20px;
      }
      .overlay-score {
        font-size: 3rem;
        font-weight: 900;
        color: white;
        margin: 16px 0;
        text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.5);
      }
      .overlay-highscore {
        font-size: 1rem;
        color: var(--gold);
        margin-bottom: 24px;
      }

      .btn {
        display: inline-block;
        padding: 14px 40px;
        font-size: 1.3rem;
        font-weight: 700;
        color: white;
        background: linear-gradient(180deg, #e65100, #bf360c);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        box-shadow:
          0 4px 0 #8b2500,
          0 6px 12px rgba(0, 0, 0, 0.3);
        transition: all 0.1s;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow:
          0 6px 0 #8b2500,
          0 8px 16px rgba(0, 0, 0, 0.3);
      }
      .btn:active {
        transform: translateY(2px);
        box-shadow:
          0 2px 0 #8b2500,
          0 3px 6px rgba(0, 0, 0, 0.3);
      }

      /* Combo indicator */
      #combo {
        position: fixed;
        top: 80px;
        right: 20px;
        font-size: 1.5rem;
        font-weight: 900;
        color: var(--gold);
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 10;
      }
      #combo.show {
        opacity: 1;
      }

      /* Difficulty badge */
      #difficulty {
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.6);
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="clouds">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
    </div>

    <div id="combo">🔥 x0</div>

    <div id="game-container">
      <div id="hud">
        <div class="hud-item score">分數: <span id="score">0</span></div>
        <div class="hud-item timer">時間: <span id="timer">30</span></div>
      </div>
      <div id="board"></div>
      <div id="difficulty">難度: 普通</div>
    </div>

    <!-- Start screen -->
    <div class="overlay" id="start-screen">
      <div class="overlay-box">
        <div class="overlay-title">🔨 打地鼠！</div>
        <div class="overlay-subtitle">在 30 秒內盡可能擊中更多地鼠！</div>
        <p style="color: rgba(255, 255, 255, 0.7); margin-bottom: 20px; font-size: 0.95rem">
          🐹 點擊冒出來的地鼠得分<br />
          🔥 連續擊中可獲得連擊加成<br />
          ⚡ 難度會隨分數提升
        </p>
        <button class="btn" id="start-btn">開始遊戲</button>
      </div>
    </div>

    <!-- Game over screen -->
    <div class="overlay hidden" id="gameover-screen">
      <div class="overlay-box">
        <div class="overlay-title">⏰ 時間到！</div>
        <div class="overlay-score" id="final-score">0</div>
        <div class="overlay-highscore" id="highscore-display">最高分: 0</div>
        <button class="btn" id="restart-btn">再來一局</button>
      </div>
    </div>

    <script>
      ;(function () {
        // ===== Audio =====
        const AudioCtx = window.AudioContext || window.webkitAudioContext
        let audioCtx = null

        function ensureAudio() {
          if (!audioCtx) {
            audioCtx = new AudioCtx()
          }
          if (audioCtx.state === "suspended") audioCtx.resume()
        }

        function playHit() {
          if (!audioCtx) return
          const osc = audioCtx.createOscillator()
          const gain = audioCtx.createGain()
          osc.connect(gain)
          gain.connect(audioCtx.destination)
          osc.type = "square"
          osc.frequency.setValueAtTime(300, audioCtx.currentTime)
          osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.05)
          osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15)
          gain.gain.setValueAtTime(0.3, audioCtx.currentTime)
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15)
          osc.start(audioCtx.currentTime)
          osc.stop(audioCtx.currentTime + 0.15)
        }

        function playMiss() {
          if (!audioCtx) return
          const osc = audioCtx.createOscillator()
          const gain = audioCtx.createGain()
          osc.connect(gain)
          gain.connect(audioCtx.destination)
          osc.type = "sine"
          osc.frequency.setValueAtTime(200, audioCtx.currentTime)
          osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1)
          gain.gain.setValueAtTime(0.15, audioCtx.currentTime)
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1)
          osc.start(audioCtx.currentTime)
          osc.stop(audioCtx.currentTime + 0.1)
        }

        function playStart() {
          if (!audioCtx) return
          ;[400, 500, 600].forEach((freq, i) => {
            const osc = audioCtx.createOscillator()
            const gain = audioCtx.createGain()
            osc.connect(gain)
            gain.connect(audioCtx.destination)
            osc.type = "sine"
            osc.frequency.value = freq
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.1)
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.15)
            osc.start(audioCtx.currentTime + i * 0.1)
            osc.stop(audioCtx.currentTime + i * 0.1 + 0.15)
          })
        }

        // ===== Game State =====
        let score = 0
        let combo = 0
        let timeLeft = 30
        let gameInterval = null
        let moleInterval = null
        let timerInterval = null
        let moleTimeout = null
        let isRunning = false
        let holes = []

        const BASE_SHOW_TIME = 1200
        const BASE_INTERVAL = 1000
        const MIN_SHOW_TIME = 400
        const MIN_INTERVAL = 350
        const MAX_COMBO = 10

        // ===== DOM =====
        const board = document.getElementById("board")
        const scoreEl = document.getElementById("score")
        const timerEl = document.getElementById("timer")
        const startScreen = document.getElementById("start-screen")
        const gameoverScreen = document.getElementById("gameover-screen")
        const finalScoreEl = document.getElementById("final-score")
        const highscoreEl = document.getElementById("highscore-display")
        const comboEl = document.getElementById("combo")
        const diffEl = document.getElementById("difficulty")

        // ===== Build board =====
        for (let i = 0; i < 9; i++) {
          const hole = document.createElement("div")
          hole.className = "hole"
          hole.innerHTML = '<div class="hole-inner"><div class="mole"></div></div>'
          hole.addEventListener("click", (e) => whack(i, e))
          hole.addEventListener(
            "touchstart",
            (e) => {
              e.preventDefault()
              whack(i, e)
            },
            { passive: false },
          )
          board.appendChild(hole)
          holes.push(hole)
        }

        // ===== Difficulty =====
        function getDifficulty() {
          const s = Math.min(score, 100)
          if (s < 10) return { show: BASE_SHOW_TIME, interval: BASE_INTERVAL, label: "普通" }
          if (s < 25) return { show: BASE_SHOW_TIME * 0.85, interval: BASE_INTERVAL * 0.75, label: "快" }
          if (s < 50) return { show: BASE_SHOW_TIME * 0.7, interval: BASE_INTERVAL * 0.6, label: "很快！" }
          if (s < 80) return { show: BASE_SHOW_TIME * 0.55, interval: BASE_INTERVAL * 0.45, label: "極速！" }
          return { show: MIN_SHOW_TIME, interval: MIN_INTERVAL, label: "地獄！" }
        }

        // ===== Score display =====
        function updateScore(points) {
          combo++
          score += points
          scoreEl.textContent = score

          // Combo display
          if (combo >= 3) {
            comboEl.textContent = `🔥 x${Math.min(combo, MAX_COMBO)}`
            comboEl.classList.add("show")
          }

          // Show score pop
          const pop = document.createElement("div")
          pop.className = "whack-effect"
          pop.textContent = `+${points}`
          pop.style.left = "50%"
          pop.style.top = "50%"
          const holeEl = holes[activeMole]
          if (holeEl) {
            const rect = holeEl.getBoundingClientRect()
            pop.style.left = rect.left + rect.width / 2 + "px"
            pop.style.top = rect.top + rect.height / 2 + "px"
          }
          document.body.appendChild(pop)
          setTimeout(() => pop.remove(), 600)
        }

        function updateDifficulty() {
          const d = getDifficulty()
          diffEl.textContent = `難度: ${d.label}`
        }

        // ===== Mole logic =====
        let activeMole = -1

        function showMole() {
          if (!isRunning) return

          // Pick a random hole that's not currently active
          let available = holes.map((_, i) => i).filter((i) => i !== activeMole)
          if (available.length === 0) return
          const idx = available[Math.floor(Math.random() * available.length)]
          activeMole = idx

          const mole = holes[idx].querySelector(".mole")
          mole.className = "mole active"
          mole.style.pointerEvents = "auto"

          const diff = getDifficulty()
          const showTime = diff.show + Math.random() * 400

          moleTimeout = setTimeout(() => {
            if (!isRunning || activeMole !== idx) return
            combo = 0
            comboEl.classList.remove("show")
            mole.className = "mole"
            activeMole = -1
            playMiss()
            // Schedule next mole
            scheduleMole()
          }, showTime)
        }

        function scheduleMole() {
          if (!isRunning) return
          const diff = getDifficulty()
          const delay = diff.interval + Math.random() * 300
          setTimeout(showMole, delay)
        }

        function whack(idx, event) {
          if (!isRunning || idx !== activeMole) return

          clearTimeout(moleTimeout)
          const mole = holes[idx].querySelector(".mole")
          mole.className = "mole hit"
          mole.style.pointerEvents = "none"

          playHit()

          const comboBonus = combo >= 3 ? Math.min(combo, MAX_COMBO) : 1
          const points = 1 * comboBonus
          updateScore(points)
          updateDifficulty()

          activeMole = -1

          // Schedule next mole immediately after hit animation
          setTimeout(scheduleMole, 200)
        }

        // ===== Timer =====
        function startTimer() {
          timerInterval = setInterval(() => {
            timeLeft--
            timerEl.textContent = timeLeft
            if (timeLeft <= 0) {
              endGame()
            }
          }, 1000)
        }

        // ===== Game lifecycle =====
        function startGame() {
          ensureAudio()
          playStart()

          score = 0
          combo = 0
          timeLeft = 30
          activeMole = -1
          scoreEl.textContent = "0"
          timerEl.textContent = "30"
          comboEl.classList.remove("show")
          updateDifficulty()

          startScreen.classList.add("hidden")
          gameoverScreen.classList.add("hidden")
          isRunning = true

          startTimer()
          scheduleMole()
        }

        function endGame() {
          isRunning = false
          clearInterval(timerInterval)
          clearTimeout(moleTimeout)
          timerInterval = null
          moleTimeout = null

          // Hide all moles
          holes.forEach((h) => {
            const m = h.querySelector(".mole")
            m.className = "mole"
          })

          // High score
          const prev = parseInt(localStorage.getItem("whack-highscore") || "0")
          if (score > prev) {
            localStorage.setItem("whack-highscore", score)
          }
          const hs = Math.max(score, prev)

          finalScoreEl.textContent = score
          highscoreEl.textContent = `最高分: ${hs}`

          setTimeout(() => {
            gameoverScreen.classList.remove("hidden")
          }, 300)
        }

        // ===== Event listeners =====
        document.getElementById("start-btn").addEventListener("click", startGame)
        document.getElementById("restart-btn").addEventListener("click", startGame)

        // Keyboard support (space/enter)
        document.addEventListener("keydown", (e) => {
          if (e.key === " " || e.key === "Enter") {
            if (!isRunning && !startScreen.classList.contains("hidden")) {
              startGame()
            } else if (!isRunning && !gameoverScreen.classList.contains("hidden")) {
              startGame()
            }
          }
        })
      })()
    </script>
  </body>
</html>
